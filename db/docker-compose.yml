services:
  postgres:
    image: postgres:16
    container_name: orionx-postgres
    environment:
      POSTGRES_USER: orionx
      POSTGRES_PASSWORD: orionx
      POSTGRES_DB: orionx
    ports:
      - "5432:5432"
    volumes:
      - orionx_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: orionx-redis
    ports:
      - "6379:6379"

volumes:
  orionx_postgres_data:
